version: "3.8"

services:
    mqtt:
     image: eclipse-mosquitto:2
     container_name: mqtt-broker
     ports:
      - "8883:8883"
     volumes:
      - ../platform/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ../pki:/mosquitto/certs:ro
     restart: unless-stopped
    
    backend:
     build:
      context: ..
      dockerfile: docker/Dockerfile.backend
     container_name: platform-backend
     ports:
      - "5000:5000"
     restart: unless-stopped
