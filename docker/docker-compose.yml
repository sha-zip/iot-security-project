version: "3.8"

services:
    influxdb:
     image: influxdb:2.7
     container_name: influxdb
     ports:
       - "8086:8086"
     volumes:
      - influxdb-data:/var/lib/influxdb2
     environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=nad
      - DOCKER_INFLUXDB_INIT_PASSWORD=nadine2004
      - DOCKER_INFLUXDB_INIT_ORG=iot_org
      - DOCKER_INFLUXDB_INIT_BUCKET=iot_bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=mytoken1234
     networks:
      - iot-net
    grafana:
     image: grafana/grafana
     container_name: grafana
     ports:
      - "3000:3000"
     restart: always
     networks:
      - iot-net
     volumes:
      - grafana-data:/var/lib/grafana

    mqtt:
     image: eclipse-mosquitto:2
     container_name: mqtt-broker
     ports:
      - "8883:8883"
     volumes:
      - ../platform/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ../pki:/mosquitto/certs:ro
      - ../pki:/etc/mosquitto/certs:ro
     restart: unless-stopped
     networks:
      - iot-net
    
    backend:
     build:
      context: ..
      dockerfile: docker/Dockerfile.backend
     container_name: platform-backend
     ports:
      - "5000:5000"
      - "8443:8443"
     environment:
      - MQTT_BROKER=mqtt
      - MQTT_PORT=8883
      - MQTT_TLS_INSECURE=true
      - CA_CERT=/app/pki/ca.crt
      - SERVER_CERT=/app/pki/server.crt
      - SERVER_KEY=/app/pki/server.key
      - MQTT_CLIENT_CERT=/app/pki/server.crt    # reuse server cert
      - MQTT_CLIENT_KEY=/app/pki/server.key
      - DB_PATH=/app/backend/logs.db
     volumes:
      - backend-db:/app/backend
     networks:
      - iot-net
     healthcheck:                    # 2. healthcheck après environment
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('https://localhost:8443/api/v1/health', context=__import__('ssl')._create_unverified_context())"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
     depends_on:
      - mqtt
      - influxdb
     restart: unless-stopped

    iot-agent-1:
     volumes:
      - /var/lib/softhsm/tokens:/var/lib/softhsm/tokens
     build:
      context: ..
      dockerfile: docker/Dockerfile.iot
     depends_on:
      backend:
       condition: service_healthy  # ← attend que backend soit healthy
      mqtt:
       condition: service_started
     environment:
      - DEVICE_ID=iot-device-001    # fixe et unique
      - PKI_URL=https://backend:8443
      - MQTT_BROKER=127.0.0.1
      - MQTT_PORT=11883
      - CA_CERT=/app/pki/ca.crt
      - CERT_STORE_DIR=/tmp/device_certs
      - VERIFY_TLS_BACKEND=false
      - STUNNEL_MODE=1
      - SE_TOKEN_LABEL=iot-token
      - SE_USER_PIN=1234
      - SE_KEY_LABEL=iot-device-key
      - PKCS11_LIB=/usr/lib/softhsm/libsofthsm2.so
     restart: unless-stopped
     networks:
      - iot-net
       
    iot-agent-2:
     volumes:
      - /var/lib/softhsm/tokens:/var/lib/softhsm/tokens
     build:
      context: ..
      dockerfile: docker/Dockerfile.iot
     depends_on:
      backend:
       condition: service_healthy  # ← attend que backend soit healthy
      mqtt:
       condition: service_started
     environment:
      - DEVICE_ID=iot-device-002    # fixe et unique
      - PKI_URL=https://backend:8443
      - MQTT_BROKER=127.0.0.1
      - MQTT_PORT=11883
      - CA_CERT=/app/pki/ca.crt
      - CERT_STORE_DIR=/tmp/device_certs
      - VERIFY_TLS_BACKEND=false
      - STUNNEL_MODE=1
      - SE_TOKEN_LABEL=iot-token
      - SE_USER_PIN=1234
      - SE_KEY_LABEL=iot-device-key
      - PKCS11_LIB=/usr/lib/softhsm/libsofthsm2.so
     networks:
      - iot-net

    iot-agent-3:
     volumes:
      - /var/lib/softhsm/tokens:/var/lib/softhsm/tokens
     build:
      context: ..
      dockerfile: docker/Dockerfile.iot
     depends_on:
      backend:
       condition: service_healthy  # ← attend que backend soit healthy
      mqtt:
       condition: service_started
     environment:
      - DEVICE_ID=iot-device-003    # fixe et unique
      - PKI_URL=https://backend:8443
      - MQTT_BROKER=127.0.0.1
      - MQTT_PORT=11883
      - CA_CERT=/app/pki/ca.crt
      - CERT_STORE_DIR=/tmp/device_certs
      - VERIFY_TLS_BACKEND=false
      - STUNNEL_MODE=1
      - SE_TOKEN_LABEL=iot-token
      - SE_USER_PIN=1234
      - SE_KEY_LABEL=iot-device-key
      - PKCS11_LIB=/usr/lib/softhsm/libsofthsm2.so
     networks:
      - iot-net
networks:
  iot-net:
    driver: bridge
volumes:
    influxdb-data:
    grafana-data:
    backend-db:
