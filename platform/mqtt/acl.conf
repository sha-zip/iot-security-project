# =============================================================================
#  acl.conf — Contrôle d'accès aux topics MQTT
#  Référencé par mosquitto.conf via : acl_file
# =============================================================================
#
#  Syntaxe :
#    user <username>          → règles pour ce user spécifique
#    topic read   <pattern>   → autoriser lecture (subscribe)
#    topic write  <pattern>   → autoriser écriture (publish)
#    topic readwrite <pattern>→ les deux
#
#  %u = username du client (= CN du certificat client)
#  %c = client_id MQTT
#
#  IMPORTANT : les règles sont évaluées dans l'ordre.
#              Toute tentative non couverte est REFUSÉE.
# =============================================================================


# -----------------------------------------------------------------------------
# Règle générale pour tous les devices IoT authentifiés
# Un device ne peut publier QUE sur son propre topic (identifié par son CN)
# et ne peut lire QUE ses propres commandes
# -----------------------------------------------------------------------------

# Chaque device publie ses données sur : iot/<son_CN>/data
topic write iot/%u/data

# Chaque device reçoit les commandes sur : iot/<son_CN>/cmd
topic read  iot/%u/cmd

# Chaque device peut publier ses logs sur : iot/<son_CN>/log
topic write iot/%u/log

# Statut de santé (heartbeat)
topic write iot/%u/status


# -----------------------------------------------------------------------------
# Backend / serveur de supervision
# Le backend s'authentifie aussi avec un certificat (CN=backend-server)
# -----------------------------------------------------------------------------

user backend-server

# Le backend peut lire les données de TOUS les devices
topic read  iot/+/data
topic read  iot/+/log
topic read  iot/+/status

# Le backend peut envoyer des commandes à tous les devices
topic write iot/+/cmd

# Topic système Mosquitto (monitoring interne)
topic read  $SYS/#


# -----------------------------------------------------------------------------
# Interdictions explicites (défense en profondeur)
# Ces topics sont réservés et ne doivent jamais être accessibles aux devices
# -----------------------------------------------------------------------------

# Aucun device ne peut accéder aux topics système Mosquitto
# (implicitement refusé, mais explicite pour la clarté)
# topic deny $SYS/#   ← syntaxe non supportée par Mosquitto, géré par l'absence de règle
