# =============================================================================
#  acl.conf — Contrôle d'accès aux topics MQTT
#  Placer dans : /etc/mosquitto/acl/acl.conf   (PAS dans conf.d/)
#  Référencé via acl_file dans iot-mtls.conf
# =============================================================================

# Chaque device ne peut accéder qu'à ses propres topics (%u = CN du certificat)
topic write iot/%u/data
topic read  iot/%u/cmd
topic write iot/%u/log
topic write iot/%u/status

# Backend (CN=backend-server) : accès à tous les devices
user backend-server
topic read  iot/+/data
topic read  iot/+/log
topic read  iot/+/status
topic write iot/+/cmd
topic read  $SYS/#
