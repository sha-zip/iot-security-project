# platform/mqtt/mosquitto.conf
# ─────────────────────────────────────────────────────────────
# Architecture :
#   - Port 1883 : TCP clair, réseau Docker interne UNIQUEMENT
#   - Port 8883 : TLS/mTLS — géré par stunnel côté broker
#
# stunnel (côté serveur) est lancé séparément dans le même
# container ou via le Dockerfile.iot. Il reçoit les connexions
# TLS sur 8883 et les transmet en clair sur 1883 localement.
# ─────────────────────────────────────────────────────────────

# ── Listener 1 : TCP clair (réseau Docker interne) ───────────
# Accessible uniquement depuis le réseau Docker iot-net
# stunnel du broker se connecte ici après déchiffrement TLS
listener 1883 0.0.0.0

# Pas de TLS sur ce listener — stunnel s'en charge
# allow_anonymous nécessaire car stunnel présente son propre cert
allow_anonymous true

# ── Persistance des messages ──────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logs ─────────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# ── Paramètres de connexion ───────────────────────────────────
max_connections 500
max_keepalive 300

# ── QoS et rétention ─────────────────────────────────────────
# Taille max d'un message MQTT (en octets)
message_size_limit 10240
