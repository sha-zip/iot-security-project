# =============================================================================
#  iot-mtls.conf — Broker MQTT Mosquitto (mTLS)
#  Placer dans : /etc/mosquitto/conf.d/iot-mtls.conf
#  ACL séparé  : /etc/mosquitto/acl/acl.conf   (PAS dans conf.d/)
# =============================================================================

# -----------------------------------------------------------------------------
# 1. PARAMÈTRES GÉNÉRAUX
# -----------------------------------------------------------------------------

allow_anonymous false

# IMPORTANT : acl.conf doit être dans /etc/mosquitto/acl/ et NON dans conf.d/
# car Mosquitto charge tous les fichiers de conf.d/ comme des configs
acl_file /etc/mosquitto/acl/acl.conf

max_packet_size 65536
max_connections 1000
persistent_client_expiration 1h

# -----------------------------------------------------------------------------
# 2. LISTENER mTLS — PORT 8883
# -----------------------------------------------------------------------------

listener 8883

tls_version tlsv1.2

ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305

cafile   /etc/mosquitto/certs/ca.crt
certfile /etc/mosquitto/certs/server.crt
keyfile  /etc/mosquitto/certs/server.key

require_certificate true
use_identity_as_username true

max_qos 1

# -----------------------------------------------------------------------------
# 3. LOGGING
# -----------------------------------------------------------------------------

log_dest file /var/log/mosquitto/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_type subscribe
log_type unsubscribe
connection_messages true
log_timestamp true
