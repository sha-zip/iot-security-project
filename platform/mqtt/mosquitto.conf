# =============================================================================
#  mosquitto.conf — Broker MQTT Mosquitto (mTLS)
#  Projet : Authentification forte des Objets Connectés — Secure Element
# =============================================================================
#
#  Architecture :
#    - Port 8883  : listener mTLS (certificat client OBLIGATOIRE)
#    - Port 1883  : DÉSACTIVÉ (aucun accès non chiffré)
#    - Authentification mutuelle : chaque device doit présenter
#      un certificat X.509 signé par notre CA
#    - Identité du device extraite du CN du certificat client
#
#  Fichiers requis avant de démarrer :
#    /etc/mosquitto/certs/ca.crt       → Certificat de la CA (public)
#    /etc/mosquitto/certs/server.crt   → Certificat du broker
#    /etc/mosquitto/certs/server.key   → Clé privée du broker (chmod 640)
# =============================================================================


# -----------------------------------------------------------------------------
# 1. PARAMÈTRES GÉNÉRAUX
# -----------------------------------------------------------------------------

# Utilisateur système sous lequel tourne Mosquitto
user mosquitto

# Pas de connexion sans configuration explicite
per_listener_settings true

# Désactiver EXPLICITEMENT le listener non-chiffré par défaut (port 1883)
# (ne pas définir de listener sur 1883 suffit, mais c'est explicite ici)
# listener 1883   ← COMMENTÉ INTENTIONNELLEMENT


# -----------------------------------------------------------------------------
# 2. LISTENER mTLS — PORT 8883
# -----------------------------------------------------------------------------

listener 8883

# ── Protocole ────────────────────────────────────────────────────────────────
# Limiter aux versions TLS sécurisées uniquement
tls_version tlsv1.2

# Suite de chiffrements autorisées (forte uniquement, PFS obligatoire)
# TLS 1.3 : suites automatiques (AES-256-GCM, ChaCha20-Poly1305)
# TLS 1.2 : uniquement ECDHE + AES-GCM ou CHACHA20
ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256

# ── Certificats ───────────────────────────────────────────────────────────────
# Certificat public de la CA (sert à vérifier les certificats clients ET serveur)
cafile /etc/mosquitto/certs/ca.crt

# Certificat du broker (présenté aux clients pour l'authentification serveur)
certfile /etc/mosquitto/certs/server.crt

# Clé privée du broker (doit être chmod 640, owner mosquitto)
keyfile /etc/mosquitto/certs/server.key

# ── Authentification mutuelle (mTLS) ─────────────────────────────────────────
# CRITIQUE : exiger un certificat client valide signé par notre CA
# Sans certificat valide → connexion refusée immédiatement
require_certificate true

# Utiliser le CN du certificat client comme nom d'utilisateur MQTT
# Permet d'identifier le device sans mot de passe supplémentaire
# Ex: CN=device-abc123 → username = "device-abc123"
use_identity_as_username true

# Interdire toute connexion anonyme
allow_anonymous false

# Vérifier que le certificat client n'est pas révoqué
# (nécessite une CRL à jour — générée par revoke_cert.sh)
# crlfile /etc/mosquitto/certs/crl.pem

# ── Réseau ────────────────────────────────────────────────────────────────────
# Adresse d'écoute (0.0.0.0 = toutes les interfaces)
# En production, restreindre à l'IP interne si possible
# bind_address 0.0.0.0

# Taille maximale d'un paquet MQTT (protège contre les gros messages malveillants)
max_packet_size 65536

# Nombre maximum de connexions simultanées (adapter à la charge)
max_connections 1000

# Timeout keepalive : déconnecter les clients silencieux après 2× keepalive
# (le client envoie keepalive=60s → timeout serveur = 120s)


# -----------------------------------------------------------------------------
# 3. CONTRÔLE D'ACCÈS AUX TOPICS
# -----------------------------------------------------------------------------

# Fichier ACL — définit qui peut publier/s'abonner à quels topics
# Le %u est remplacé par le username du client (= CN du certificat)
acl_file /etc/mosquitto/conf.d/acl.conf


# -----------------------------------------------------------------------------
# 4. PERSISTANCE
# -----------------------------------------------------------------------------

# Désactivé : les messages ne sont pas sauvegardés sur disque
# (préférable pour l'IoT temps réel ; activer si besoin de rétention)
persistence false

# Si persistence=true, décommenter :
# persistence_location /var/lib/mosquitto/
# persistence_file mosquitto.db
# autosave_interval 300


# -----------------------------------------------------------------------------
# 5. LOGGING
# -----------------------------------------------------------------------------

# Destination des logs
log_dest file /var/log/mosquitto/mosquitto.log
log_dest stdout

# Niveaux de log enregistrés
log_type error
log_type warning
log_type notice
log_type information
log_type subscribe
log_type unsubscribe

# Logguer les connexions/déconnexions (utile pour l'audit de sécurité)
connection_messages true

# Horodatage dans les logs
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Rotation des logs (si log_dest = file)
# log_facility 5


# -----------------------------------------------------------------------------
# 6. PARAMÈTRES MQTT
# -----------------------------------------------------------------------------

# Version MQTT supportée (3.1, 3.1.1, 5)
# MQTT 5 apporte des propriétés de session et raisons de déconnexion
# (paho-mqtt 2.x supporte MQTTv5)

# Qualité de service maximale autorisée par le broker
# QoS 1 = au moins une fois (recommandé pour IoT)
# QoS 2 = exactement une fois (overhead plus élevé)
max_qos 1

# Taille maximale de la file de messages en attente par client
max_inflight_messages 20

# Fenêtre de messages en attente pour clients déconnectés (QoS 1+)
max_queued_messages 100

# Retain : désactiver si les devices ne doivent pas récupérer
# le dernier état au reconnect (sécurité : évite la fuite d'état)
# retain_available false

# Délai avant de considérer une session expirée
persistent_client_expiration 1h
